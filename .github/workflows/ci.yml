name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    # Native Windows is a supported platform, not a best-effort one (RUN-42) — so it is a matrix
    # leg rather than a line in the README. Every break this task fixed produced a WRONG ANSWER
    # instead of an error (rebaseInProgress silently reporting "no rebase in progress"; a timeout
    # kill that reaps the shell and orphans the tree it was meant to stop), which is exactly the
    # class a human smoke test misses and a green Linux run cannot see at all. The platform
    # branches are unit-tested with an injected platform; this job is what keeps those stubs
    # honest about the real one.
    strategy:
      fail-fast: false # a Windows-only break must show up AS a Windows-only break
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # v4 targets the Node 20 action runtime, which GitHub has deprecated and now force-runs
      # on Node 24 with a warning. `node-version` below is unrelated — that is the runtime the
      # PROJECT is tested against, and package.json says >=20.
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build

      # Install the real tarball and run the real binary. This is the ONLY step here that
      # exercises the path a stranger takes, and v0.2.0 proves it has to exist: it shipped a
      # binary that printed nothing and exited 0 for every command, because the entry guard
      # compared `import.meta.url` against a raw `process.argv[1]` and npm's bin is a SYMLINK.
      #
      # Every other step above was green. 365 unit tests were green. They import `run()`
      # directly — for them the guard is *supposed* to be false — and `npm run dev` passes a
      # real path, so the one line that decides whether the CLI runs at all was covered by
      # nothing, on the only path that ships.
      #
      # Assert on OUTPUT, never on the exit code: the bug WAS exit 0.
      - name: Smoke-test the packed binary (as a stranger installs it)
        shell: bash
        run: |
          set -euo pipefail
          npm pack --silent
          npm install -g ./noriq-dev-runner-*.tgz
          got=$(noriq-runner version)
          want=$(node -p "require('./package.json').version")
          echo "installed binary reported: '${got}' (want '${want}')"
          test "${got}" = "${want}"
          noriq-runner help | grep -q 'noriq-runner <command>'
